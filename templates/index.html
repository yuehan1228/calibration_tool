<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>雷达自动标定工具</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <div class="container">
        <h1>雷达自动标定工具</h1>

        <form id="calibForm" enctype="multipart/form-data">
            <!-- 文件上传 -->
            <section class="section">
                <h2>文件上传</h2>
                <div class="form-row">
                    <label>GNSS 数据格式:</label>
                    <select name="gnss_format" id="gnss_format">
                        <option value="local">局部坐标 (x, y, z)</option>
                        <option value="wgs84">经纬度 (B, L, H) - 纬度、经度、高度</option>
                    </select>
                </div>
                <div class="form-row">
                    <label>GNSS 坐标文件:</label>
                    <input type="file" name="gnss_file" accept=".csv,.txt" required>
                </div>
                <div class="form-row">
                    <label>雷达坐标文件:</label>
                    <input type="file" name="radar_file" accept=".csv,.txt" required>
                </div>
            </section>

            <!-- WGS84转换矩阵 -->
            <section class="section" id="transform_matrix_section" style="display: none;">
                <h2>WGS84 到泊位坐标系转换矩阵</h2>
                <p class="hint">输入4x4齐次变换矩阵，将经纬度坐标转换为泊位局部坐标</p>
                <div class="matrix-input">
                    <table class="matrix-input-table">
                        <tr>
                            <td><input type="number" name="m00" step="0.000001" value="1"></td>
                            <td><input type="number" name="m01" step="0.000001" value="0"></td>
                            <td><input type="number" name="m02" step="0.000001" value="0"></td>
                            <td><input type="number" name="m03" step="0.000001" value="0"></td>
                        </tr>
                        <tr>
                            <td><input type="number" name="m10" step="0.000001" value="0"></td>
                            <td><input type="number" name="m11" step="0.000001" value="1"></td>
                            <td><input type="number" name="m12" step="0.000001" value="0"></td>
                            <td><input type="number" name="m13" step="0.000001" value="0"></td>
                        </tr>
                        <tr>
                            <td><input type="number" name="m20" step="0.000001" value="0"></td>
                            <td><input type="number" name="m21" step="0.000001" value="0"></td>
                            <td><input type="number" name="m22" step="0.000001" value="1"></td>
                            <td><input type="number" name="m23" step="0.000001" value="0"></td>
                        </tr>
                        <tr>
                            <td><input type="number" name="m30" step="0.000001" value="0" readonly></td>
                            <td><input type="number" name="m31" step="0.000001" value="0" readonly></td>
                            <td><input type="number" name="m32" step="0.000001" value="0" readonly></td>
                            <td><input type="number" name="m33" step="0.000001" value="1" readonly></td>
                        </tr>
                    </table>
                </div>
            </section>

            <!-- 传感器配置 -->
            <section class="section">
                <h2>传感器配置</h2>
                <div class="form-row">
                    <label>目标坐标系:</label>
                    <select name="coord_system" id="coord_system">
                        <option value="rot_center">旋转中心坐标系</option>
                        <option value="arm">臂架坐标系</option>
                        <option value="chute">溜筒坐标系</option>
                    </select>
                </div>
            </section>

            <!-- 姿态参数 -->
            <section class="section">
                <h2>大机姿态参数</h2>

                <h3>基本参数</h3>
                <div class="form-grid">
                    <div class="form-row">
                        <label>回转角 (°):</label>
                        <input type="number" name="slewing_angle" step="0.000001" required>
                    </div>
                    <div class="form-row">
                        <label>俯仰角 (°):</label>
                        <input type="number" name="luffing_angle" step="0.000001" required>
                    </div>
                </div>

                <h3>旋转中心坐标</h3>
                <div class="form-grid">
                    <div class="form-row">
                        <label>X (m):</label>
                        <input type="number" name="rot_center_x" step="0.000001" required>
                    </div>
                    <div class="form-row">
                        <label>Y (m):</label>
                        <input type="number" name="rot_center_y" step="0.000001" required>
                    </div>
                    <div class="form-row">
                        <label>Z (m):</label>
                        <input type="number" name="rot_center_z" step="0.000001" required>
                    </div>
                </div>

                <!-- 臂架参数（臂架坐标系和溜筒坐标系时显示） -->
                <div id="arm_params" style="display: none;">
                    <h3>臂架参数</h3>
                    <div class="form-grid">
                        <div class="form-row">
                            <label>臂架长度 (m):</label>
                            <input type="number" name="arm_length" step="0.000001" required>
                        </div>
                        <div class="form-row">
                            <label>伸缩距离 (m):</label>
                            <input type="number" name="stretch_dist" step="0.000001" required>
                        </div>
                    </div>
                </div>

                <!-- 连接点参数（仅溜筒坐标系时显示） -->
                <div id="connect_params" style="display: none;">
                    <h3>连接点参数</h3>
                    <div class="form-grid">
                        <div class="form-row">
                            <label>连接点距离 (m):</label>
                            <input type="number" name="connect_dist" step="0.000001" required>
                        </div>
                    </div>
                </div>
            </section>

            <button type="submit" class="btn-calculate">计算</button>
        </form>

        <!-- 结果展示 -->
        <section class="section" id="result_section" style="display: none;">
            <h2>计算结果</h2>

            <h3>标定矩阵 T_fixed</h3>
            <div class="matrix-display" id="matrix_result"></div>

            <h3>变换误差</h3>
            <div class="error-summary" id="error_summary"></div>
            <div class="error-details" id="error_details"></div>
        </section>

        <div id="error_message" class="error-message" style="display: none;"></div>
    </div>

    <script>
        // GNSS格式切换
        document.getElementById('gnss_format').addEventListener('change', updateGnssFormatVisibility);

        function updateGnssFormatVisibility() {
            const gnssFormat = document.getElementById('gnss_format').value;
            const matrixSection = document.getElementById('transform_matrix_section');
            matrixSection.style.display = (gnssFormat === 'wgs84') ? 'block' : 'none';
        }

        // 坐标系切换时显示/隐藏相应参数
        document.getElementById('coord_system').addEventListener('change', updateCoordSystemVisibility);

        function updateCoordSystemVisibility() {
            const coordSystem = document.getElementById('coord_system').value;
            const armParams = document.getElementById('arm_params');
            const connectParams = document.getElementById('connect_params');

            // 臂架参数：臂架坐标系和溜筒坐标系时显示
            armParams.style.display = (coordSystem === 'arm' || coordSystem === 'chute') ? 'block' : 'none';

            // 连接点参数：仅溜筒坐标系时显示
            connectParams.style.display = (coordSystem === 'chute') ? 'block' : 'none';
        }

        // 页面加载时初始化
        updateGnssFormatVisibility();
        updateCoordSystemVisibility();

        // 表单提交
        document.getElementById('calibForm').addEventListener('submit', async function(e) {
            e.preventDefault();

            const formData = new FormData(this);

            try {
                const response = await fetch('/calculate', {
                    method: 'POST',
                    body: formData
                });

                const data = await response.json();

                if (data.error) {
                    showError(data.error);
                } else if (data.success) {
                    showResult(data);
                }
            } catch (err) {
                showError('请求失败: ' + err.message);
            }
        });

        function showError(message) {
            document.getElementById('error_message').textContent = message;
            document.getElementById('error_message').style.display = 'block';
            document.getElementById('result_section').style.display = 'none';
        }

        function showResult(data) {
            document.getElementById('error_message').style.display = 'none';
            document.getElementById('result_section').style.display = 'block';

            // 显示矩阵
            const matrix = data.matrix;
            let matrixHtml = '<table class="matrix-table">';
            for (let i = 0; i < 4; i++) {
                matrixHtml += '<tr>';
                for (let j = 0; j < 4; j++) {
                    matrixHtml += `<td>${matrix[i][j].toFixed(6)}</td>`;
                }
                matrixHtml += '</tr>';
            }
            matrixHtml += '</table>';
            document.getElementById('matrix_result').innerHTML = matrixHtml;

            // 显示误差汇总
            document.getElementById('error_summary').innerHTML =
                `平均误差: ${data.mean_error.toFixed(4)} m | 最大误差: ${data.max_error.toFixed(4)} m`;

            // 显示详细误差
            let errorHtml = '<table class="error-table"><tr><th>点号</th><th>误差 (m)</th></tr>';
            data.errors.forEach((err, idx) => {
                errorHtml += `<tr><td>点 ${idx + 1}</td><td>${err.toFixed(6)}</td></tr>`;
            });
            errorHtml += '</table>';
            document.getElementById('error_details').innerHTML = errorHtml;
        }
    </script>
</body>
</html>
